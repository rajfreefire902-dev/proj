<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DocuMind - Auth</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body class="auth-body">

<div class="auth-wrapper">

    <div class="auth-box">
        <h2 id="form-title">Login</h2>

        <form id="auth-form">
            <input type="text" id="username" placeholder="Enter your username" class="input-field hidden">
            <input type="email" id="email" placeholder="Enter your email" class="input-field" required>
            <input type="password" id="password" placeholder="Enter your password" class="input-field" required>

            <button type="submit" class="btn">Submit</button>
        </form>

        <p class="toggle-text">
            Don't have an account?
            <span id="toggle-btn">Register</span>
        </p>
    </div>

</div>

<script src="../scripts/api.js"></script>
<script src="../scripts/auth.js"></script>

</body>
</html>
